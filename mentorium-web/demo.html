<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Learning App - Forum Tab</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
        }
        
        .rtl {
            direction: rtl;
        }
        
        .ltr {
            direction: ltr;
        }
    </style>
</head>

<body class="bg-neutral-50">
    <div id="root"></div>

    <script type="text/babel">
        // Custom architectural icons - classical abstractions, not generic const GateIcon = () => (
        <svg className="w-6 h-6" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
            <path d="M4 20V10L12 4L20 10V20" strokeLinecap="round" strokeLinejoin="round"/>
            <path d="M9 20V14H15V20" strokeLinecap="round" strokeLinejoin="round"/>
          </svg> ); const ScaleIcon = () => (
        <svg className="w-6 h-6" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
            <path d="M12 3V21M7 8L12 3L17 8M7 8L5 13H9L7 8ZM17 8L19 13H15L17 8Z" strokeLinecap="round" strokeLinejoin="round"/>
          </svg> ); const SealIcon = () => (
        <svg className="w-6 h-6" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
            <circle cx="12" cy="12" r="9"/>
            <circle cx="12" cy="12" r="3" fill="currentColor"/>
          </svg> ); const ForumIcon = () => (
        <svg className="w-6 h-6" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
            <rect x="3" y="10" width="18" height="11" strokeLinecap="round" strokeLinejoin="round"/>
            <path d="M7 10V6M12 10V6M17 10V6" strokeLinecap="round"/>
          </svg> ); function LearningAppHome() { const [activeTab, setActiveTab] = React.useState('forum'); const [language, setLanguage] = React.useState('en'); // 'en' or 'ar' const isRTL = language === 'ar'; // Translation object const t =
        { en: { forum: "The Forum", houses: "Houses", trials: "Trials", seal: "Seal", standingIn: "You are within the House of Euler", nextThreshold: "Next Threshold", doorNum: "Door XII", lessonTitle: "Quadratic Equations", lessonDesc: "Foundations in
        algebraic reasoning and symbolic manipulation", enterDoor: "Enter Door", standingInLabel: "Standing In", houseOfEuler: "House of Euler", mathematics: "Mathematics", doorsOpened: "Doors Opened", doorsCount: "Eleven of twenty-four", trialPerformance:
        "Trial Performance", pastDays: "Past seven days", thisWeek: "+12 this week", quote: "Mathematics is not about numbers, equations, or algorithms—it is about understanding.", quoteAuthor: "— William Thurston", navForum: "Forum", navHouses: "Houses",
        navTrials: "Trials", navSeal: "Seal", profileTitle: "Your Seal", languageSettings: "Language", english: "English", arabic: "العربية", userName: "Michael", housesTitle: "Mathematical Houses", eulerHouse: "Euler House", gaussHouse: "Gauss House",
        noetherHouse: "Noether House", riemannHouse: "Riemann House", housesDescription: "Explore the great houses of mathematical thought", trialsTitle: "Active Trials", trial1: "Algebra Fundamentals", trial2: "Geometric Proofs", trial3: "Calculus Basics",
        trialProgress: "Progress", trialStatus: "In Progress" }, ar: { forum: "الساحة", houses: "البيوت", trials: "التجارب", seal: "الختم", standingIn: "أنت في بيت أويلر", nextThreshold: "العتبة التالية", doorNum: "الباب الثاني عشر", lessonTitle: "المعادلات
        التربيعية", lessonDesc: "أسس التفكير الجبري والمعالجة الرمزية", enterDoor: "ادخل الباب", standingInLabel: "موقفك", houseOfEuler: "بيت أويلر", mathematics: "الرياضيات", doorsOpened: "الأبواب المفتوحة", doorsCount: "أحد عشر من أربعة وعشرين", trialPerformance:
        "أداء التجارب", pastDays: "السبعة أيام الماضية", thisWeek: "+١٢ هذا الأسبوع", quote: "الرياضيات ليست عن الأرقام أو المعادلات أو الخوارزميات — بل عن الفهم.", quoteAuthor: "— ويليام ثورستون", navForum: "الساحة", navHouses: "البيوت", navTrials: "التجارب",
        navSeal: "الختم", profileTitle: "ختمك", languageSettings: "اللغة", english: "English", arabic: "العربية", userName: "مايكل", housesTitle: "بيوت الرياضيات", eulerHouse: "بيت أويلر", gaussHouse: "بيت غاوس", noetherHouse: "بيت نويثر", riemannHouse:
        "بيت ريمان", housesDescription: "استكشف البيوت العظيمة للفكر الرياضي", trialsTitle: "التجارب النشطة", trial1: "أساسيات الجبر", trial2: "براهين هندسية", trial3: "مبادئ التفاضل والتكامل", trialProgress: "التقدم", trialStatus: "قيد التنفيذ" } };
        const text = t[language]; // Forum Tab Content const renderForumTab = () => (
        <div className={`flex-1 overflow-y-auto pb-20 ${isRTL ? 'rtl' : 'ltr'}`}>
            {/* Header - The Forum */}
            <div className="bg-white px-6 pt-8 pb-5 border-b border-neutral-200">
                <div className={`flex items-start justify-between mb-3 ${isRTL ? 'flex-row-reverse' : ''}`}>
                    <div className={isRTL ? 'text-right' : ''}>
                        <p className="text-xs font-medium text-neutral-500 uppercase tracking-wider">{text.forum}</p>
                        <h1 className="text-2xl font-semibold text-neutral-900 mt-1">{text.userName}</h1>
                    </div>
                    {/* Threshold Progress Ring */}
                    <div className="relative w-14 h-14">
                        <svg className="w-14 h-14 transform -rotate-90">
                      <circle cx="28" cy="28" r="24" stroke="#e5e5e5" strokeWidth="3" fill="none"/>
                      <circle
                        cx="28" cy="28" r="24" stroke="#1a1a1a" strokeWidth="3" fill="none"
                        strokeDasharray={`${2 * Math.PI * 24}`}
                        strokeDashoffset={`${2 * Math.PI * 24 * (1 - 0.73)}`}
                        strokeLinecap="square"
                      />
                    </svg>
                        <div className="absolute inset-0 flex flex-col items-center justify-center">
                            <span className="text-xs font-semibold text-neutral-900">{language === 'ar' ? '٧٣' : '73'}</span>
                            <span className="text-[9px] text-neutral-500">%</span>
                        </div>
                    </div>
                </div>
                <p className={`text-sm text-neutral-600 ${isRTL ? 'text-right' : ''}`}>{text.standingIn}</p>
            </div>

            {/* Next Threshold */}
            <div className="px-6 mt-6">
                <h2 className={`text-[11px] font-semibold text-neutral-500 uppercase tracking-wider mb-3 ${isRTL ? 'text-right' : ''}`}>
                    {text.nextThreshold}
                </h2>
                <div className="bg-white rounded-sm p-6 border-2 border-neutral-900 shadow-sm">
                    <div className={`flex items-start justify-between mb-3 ${isRTL ? 'flex-row-reverse' : ''}`}>
                        <div className={`flex-1 ${isRTL ? 'text-right' : ''}`}>
                            <p className="text-xs text-neutral-500 mb-1 uppercase tracking-wide">{text.doorNum}</p>
                            <h3 className="text-xl font-semibold text-neutral-900">{text.lessonTitle}</h3>
                        </div>
                        <div className={`w-2 h-2 bg-neutral-900 mt-2 ${isRTL ? 'mr-4' : 'ml-4'}`}></div>
                    </div>
                    <p className={`text-sm text-neutral-600 mb-5 leading-relaxed ${isRTL ? 'text-right' : ''}`}>
                        {text.lessonDesc}
                    </p>
                    <button className="w-full bg-neutral-900 text-white font-medium py-3.5 px-4 text-sm tracking-wide hover:bg-neutral-800 transition-colors">
                    {text.enterDoor}
                  </button>
                </div>
            </div>

            {/* Standing In */}
            <div className="px-6 mt-8">
                <h2 className={`text-[11px] font-semibold text-neutral-500 uppercase tracking-wider mb-3 ${isRTL ? 'text-right' : ''}`}>
                    {text.standingInLabel}
                </h2>

                <div className="bg-white rounded-sm p-5 mb-3 border-2 border-neutral-300">
                    <div className={`flex items-center justify-between ${isRTL ? 'flex-row-reverse' : ''}`}>
                        <div className={`flex items-center gap-4 ${isRTL ? 'flex-row-reverse' : ''}`}>
                            <div className="w-12 h-12 bg-neutral-900 flex items-center justify-center">
                                <span className="text-white font-bold text-lg">Ε</span>
                            </div>
                            <div className={isRTL ? 'text-right' : ''}>
                                <p className="text-base font-semibold text-neutral-900">{text.houseOfEuler}</p>
                                <p className="text-xs text-neutral-500 uppercase tracking-wide">{text.mathematics}</p>
                            </div>
                        </div>
                        <svg className={`w-5 h-5 text-neutral-400 ${isRTL ? 'rotate-180' : ''}`} fill="none" stroke="currentColor" viewBox="0 0 24 24">
                      <path strokeLinecap="square" strokeLinejoin="miter" strokeWidth={2} d="M9 5l7 7-7 7" />
                    </svg>
                    </div>
                </div>

                {/* Doors Opened */}
                <div className="bg-white rounded-sm p-5 mb-3 border border-neutral-200">
                    <div className={`flex items-center justify-between mb-3 ${isRTL ? 'flex-row-reverse' : ''}`}>
                        <div className={isRTL ? 'text-right' : ''}>
                            <p className="text-sm font-semibold text-neutral-900">{text.doorsOpened}</p>
                            <p className="text-xs text-neutral-500 mt-0.5">{text.doorsCount}</p>
                        </div>
                        <p className="text-lg font-bold text-neutral-900 tabular-nums">{language === 'ar' ? '١١' : '11'}</p>
                    </div>
                    <div className={`w-full h-1.5 bg-neutral-200 overflow-hidden ${isRTL ? 'rtl' : ''}`}>
                        <div className={`h-full bg-neutral-900 ${isRTL ? 'mr-auto' : ''}`} style={{ width: '46%' }}></div>
                    </div>
                </div>

                {/* Trial Performance */}
                <div className="bg-white rounded-sm p-5 border border-neutral-200">
                    <div className={`flex items-center justify-between ${isRTL ? 'flex-row-reverse' : ''}`}>
                        <div className={isRTL ? 'text-right' : ''}>
                            <p className="text-sm font-semibold text-neutral-900">{text.trialPerformance}</p>
                            <p className="text-xs text-neutral-500 mt-0.5">{text.pastDays}</p>
                        </div>
                        <div className={`text-right ${isRTL ? 'text-left' : ''}`}>
                            <p className="text-lg font-bold text-neutral-900 tabular-nums">{language === 'ar' ? '٨٤' : '84'}%</p>
                            <p className="text-xs text-green-600">{text.thisWeek}</p>
                        </div>
                    </div>
                </div>
            </div>

            {/* Inspirational Quote */}
            <div className="px-6 mt-8 pb-6">
                <div className="bg-neutral-900 rounded-sm p-6">
                    <p className={`text-white text-base italic leading-relaxed ${isRTL ? 'text-right' : ''}`}>
                        "{text.quote}"
                    </p>
                    <p className={`text-neutral-300 text-sm mt-3 font-medium ${isRTL ? 'text-left' : 'text-right'}`}>
                        {text.quoteAuthor}
                    </p>
                </div>
            </div>
        </div>
        ); // Houses Tab Content const renderHousesTab = () => (
        <div className={`flex-1 overflow-y-auto pb-20 ${isRTL ? 'rtl' : 'ltr'}`}>
            <div className="bg-white px-6 pt-8 pb-6 border-b border-neutral-200">
                <h1 className="text-2xl font-semibold text-neutral-900">{text.housesTitle}</h1>
                <p className={`text-sm text-neutral-600 mt-2 ${isRTL ? 'text-right' : ''}`}>
                    {text.housesDescription}
                </p>
            </div>

            <div className="px-6 mt-6 space-y-4">
                {[ { name: text.eulerHouse, letter: 'Ε', desc: text.mathematics }, { name: text.gaussHouse, letter: 'G', desc: 'Number Theory' }, { name: text.noetherHouse, letter: 'N', desc: 'Abstract Algebra' }, { name: text.riemannHouse, letter: 'R', desc: 'Geometry
                & Analysis' } ].map((house, index) => (
                <div key={index} className="bg-white rounded-sm p-5 border-2 border-neutral-300">
                    <div className={`flex items-center justify-between ${isRTL ? 'flex-row-reverse' : ''}`}>
                        <div className={`flex items-center gap-4 ${isRTL ? 'flex-row-reverse' : ''}`}>
                            <div className="w-12 h-12 bg-neutral-900 flex items-center justify-center">
                                <span className="text-white font-bold text-lg">{house.letter}</span>
                            </div>
                            <div className={isRTL ? 'text-right' : ''}>
                                <p className="text-base font-semibold text-neutral-900">{house.name}</p>
                                <p className="text-xs text-neutral-500 uppercase tracking-wide">{house.desc}</p>
                            </div>
                        </div>
                        <svg className={`w-5 h-5 text-neutral-400 ${isRTL ? 'rotate-180' : ''}`} fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path strokeLinecap="square" strokeLinejoin="miter" strokeWidth={2} d="M9 5l7 7-7 7" />
                      </svg>
                    </div>
                </div>
                ))}
            </div>
        </div>
        ); // Trials Tab Content const renderTrialsTab = () => (
        <div className={`flex-1 overflow-y-auto pb-20 ${isRTL ? 'rtl' : 'ltr'}`}>
            <div className="bg-white px-6 pt-8 pb-6 border-b border-neutral-200">
                <h1 className="text-2xl font-semibold text-neutral-900">{text.trialsTitle}</h1>
            </div>

            <div className="px-6 mt-6 space-y-4">
                {[ { title: text.trial1, progress: 75, status: text.trialStatus }, { title: text.trial2, progress: 42, status: text.trialStatus }, { title: text.trial3, progress: 18, status: text.trialStatus } ].map((trial, index) => (
                <div key={index} className="bg-white rounded-sm p-5 border border-neutral-200">
                    <div className={`flex items-center justify-between mb-3 ${isRTL ? 'flex-row-reverse' : ''}`}>
                        <h3 className="text-base font-semibold text-neutral-900">{trial.title}</h3>
                        <span className="text-xs text-neutral-500 uppercase tracking-wide">{trial.status}</span>
                    </div>
                    <div className={`flex items-center justify-between ${isRTL ? 'flex-row-reverse' : ''}`}>
                        <div className="flex-1 mr-4">
                            <div className="w-full h-2 bg-neutral-200 rounded-full overflow-hidden">
                                <div className="h-full bg-neutral-900 rounded-full" style={{ width: `${trial.progress}%` }}></div>
                            </div>
                        </div>
                        <span className="text-sm font-semibold text-neutral-900 tabular-nums">
                        {language === 'ar' ? trial.progress.toString().replace(/\d/g, d => '٠١٢٣٤٥٦٧٨٩'[d]) : trial.progress}%
                      </span>
                    </div>
                </div>
                ))}
            </div>
        </div>
        ); // Profile/Seal Tab Content const renderSealTab = () => (
        <div className={`flex-1 overflow-y-auto pb-20 ${isRTL ? 'rtl' : 'ltr'}`}>
            {/* Profile Header */}
            <div className="bg-white px-6 pt-8 pb-6 border-b-2 border-neutral-900">
                <div className="flex flex-col items-center">
                    <div className="w-24 h-24 bg-neutral-900 flex items-center justify-center mb-4">
                        <span className="text-white font-bold text-4xl">م</span>
                    </div>
                    <h1 className="text-2xl font-semibold text-neutral-900">{text.userName}</h1>
                    <p className="text-sm text-neutral-500 mt-1">{text.houseOfEuler}</p>
                </div>
            </div>

            {/* Language Settings */}
            <div className="px-6 mt-6">
                <h2 className="text-[11px] font-semibold text-neutral-500 uppercase tracking-wider mb-3">
                    {text.languageSettings}
                </h2>
                <div className="bg-white rounded-sm border-2 border-neutral-200 overflow-hidden">
                    <button onClick={()=> setLanguage('en')}
                    className={`w-full px-5 py-4 flex items-center justify-between border-b border-neutral-200 transition-colors ${
                      language === 'en' ? 'bg-neutral-100' : 'bg-white'
                    }`}
                  >
                    <span className="text-sm font-medium text-neutral-900">English</span>
                    {language === 'en' && <div className="w-2 h-2 bg-neutral-900"></div>}
                  </button>
                    <button onClick={()=> setLanguage('ar')}
                    className={`w-full px-5 py-4 flex items-center justify-between transition-colors ${
                      language === 'ar' ? 'bg-neutral-100' : 'bg-white'
                    }`}
                  >
                    <span className="text-sm font-medium text-neutral-900">العربية</span>
                    {language === 'ar' && <div className="w-2 h-2 bg-neutral-900"></div>}
                  </button>
                </div>
            </div>

            {/* Stats Preview */}
            <div className="px-6 mt-6">
                <div className="grid grid-cols-3 gap-3">
                    <div className="bg-white rounded-sm p-4 border border-neutral-200 text-center">
                        <p className="text-2xl font-bold text-neutral-900 tabular-nums">11</p>
                        <p className="text-xs text-neutral-500 mt-1 uppercase tracking-wide">{text.doorsOpened}</p>
                    </div>
                    <div className="bg-white rounded-sm p-4 border border-neutral-200 text-center">
                        <p className="text-2xl font-bold text-neutral-900 tabular-nums">84%</p>
                        <p className="text-xs text-neutral-500 mt-1 uppercase tracking-wide">{text.trialPerformance}</p>
                    </div>
                    <div className="bg-white rounded-sm p-4 border border-neutral-200 text-center">
                        <p className="text-2xl font-bold text-neutral-900 tabular-nums">73%</p>
                        <p className="text-xs text-neutral-500 mt-1 uppercase tracking-wide">{text.forum}</p>
                    </div>
                </div>
            </div>
        </div>
        ); // Render active tab content const renderActiveTab = () => { switch(activeTab) { case 'forum': return renderForumTab(); case 'houses': return renderHousesTab(); case 'trials': return renderTrialsTab(); case 'seal': return renderSealTab(); default:
        return renderForumTab(); } }; return (
        <div className={`flex flex-col h-screen max-w-md mx-auto ${isRTL ? 'rtl' : 'ltr'} font-sans`}>
            {/* Main Content Area */} {renderActiveTab()} {/* Bottom Navigation */}
            <div className="fixed bottom-0 left-1/2 transform -translate-x-1/2 w-full max-w-md bg-white border-t border-neutral-200">
                <div className="grid grid-cols-4">
                    <button onClick={()=> setActiveTab('forum')}
                    className={`flex flex-col items-center py-3 px-2 transition-colors ${
                      activeTab === 'forum' 
                        ? 'text-neutral-900 bg-neutral-100' 
                        : 'text-neutral-500 hover:text-neutral-700'
                    }`}
                  >
                    <ForumIcon />
                    <span className="text-xs mt-1 font-medium">{text.navForum}</span>
                  </button>

                    <button onClick={()=> setActiveTab('houses')}
                    className={`flex flex-col items-center py-3 px-2 transition-colors ${
                      activeTab === 'houses' 
                        ? 'text-neutral-900 bg-neutral-100' 
                        : 'text-neutral-500 hover:text-neutral-700'
                    }`}
                  >
                    <GateIcon />
                    <span className="text-xs mt-1 font-medium">{text.navHouses}</span>
                  </button>

                    <button onClick={()=> setActiveTab('trials')}
                    className={`flex flex-col items-center py-3 px-2 transition-colors ${
                      activeTab === 'trials' 
                        ? 'text-neutral-900 bg-neutral-100' 
                        : 'text-neutral-500 hover:text-neutral-700'
                    }`}
                  >
                    <ScaleIcon />
                    <span className="text-xs mt-1 font-medium">{text.navTrials}</span>
                  </button>

                    <button onClick={()=> setActiveTab('seal')}
                    className={`flex flex-col items-center py-3 px-2 transition-colors ${
                      activeTab === 'seal' 
                        ? 'text-neutral-900 bg-neutral-100' 
                        : 'text-neutral-500 hover:text-neutral-700'
                    }`}
                  >
                    <SealIcon />
                    <span className="text-xs mt-1 font-medium">{text.navSeal}</span>
                  </button>
                </div>
            </div>
        </div>
        ); } const root = ReactDOM.createRoot(document.getElementById('root')); root.render(
        <LearningAppHome />);
    </script>
</body>

</html>
